version: '3'
services:
  hyperf-skeleton:
    container_name: hyperf-skeleton
    image: hyperf-skeleton
    build:
      context: .
#    volumes:
#      - ./:/opt/www
    ports:
      - 9501:9501
    environment:
      - APP_ENV=dev
      - SCAN_CACHEABLE=false
    depends_on:
      - mysql
      - redis
    networks:
      - hyperf-net

  mysql:
    image: mysql:8.0
    container_name: mysql-aeo
    ports:
      - "13306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=aeo_ai
    volumes:
      - ./aeo_ai.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hyperf-net

  redis:
    image: redis:alpine
    container_name: redis-aeo
    ports:
      - "6379:6379"
    networks:
      - hyperf-net

networks:
  hyperf-net:
    driver: bridge
